services:
  open_cv_worker:
    build: .
    container_name: open_cv
    command: sleep infinity
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - ai_network

  jupyter_2:
    build: .
    container_name: jupyter_env_2
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - ai_network

networks:
  ai_network:
    name: ai_network

